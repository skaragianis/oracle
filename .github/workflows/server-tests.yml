name: Server testsA

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/server-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/server-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Run server and common tests
        run: uv run pytest --ignore=tests/test_cli_main.py
